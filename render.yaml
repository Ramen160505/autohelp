services:
  - type: web
    name: autohelp-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: autohelp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: APK_URL
        sync: false

databases:
  - name: autohelp-db
    databaseName: autohelp
    user: autohelp_user
